# Fails the build if BODY.md is out of sync with the codebase.
#
# Catches: --no-verify bypass, GitHub web-editor commits, merged PRs that
# forgot to regenerate. Mirrors tests/test_body_in_sync.py.

name: BODY.md in sync

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  body-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Debug — show drift diff (temporary)
        run: |
          cp BODY.md /tmp/before.md
          python tools/regenerate_body.py
          diff -u /tmp/before.md BODY.md || true
      - name: Check BODY.md is in sync with code
        run: |
          git checkout -- BODY.md
          python tools/regenerate_body.py --check
