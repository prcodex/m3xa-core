# Fails the build if any pyproject dependency is missing a doc under
# docs/stack/. Mirrors tests/test_stack_in_sync.py.

name: docs/stack in sync

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  stack-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check every pyproject dep has a doc under docs/stack/
        run: python tools/check_stack_in_sync.py
